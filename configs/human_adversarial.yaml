# Adversarial Human Model Configuration
# Tests worst-case interference from congestion-seeking humans

# Map and tasks
map_path: "data/maps/warehouse-10-20-10-2-1.map"
task_stream_path: null

# Simulation length
steps: 2000

# Agents and humans
num_agents: 20
num_humans: 5

# Perception and safety
fov_radius: 5
safety_radius: 1

# Global planning (Tier 1)
global_solver: "lacam"
replan_every: 25
horizon: 50

# Local execution (Tier 2)
communication_mode: "token"
local_planner: "astar"

# Human behavior model: adversarial (congestion-seeking)
human_model: "adversarial"
human_model_params:
  gamma: 2.0     # aggressiveness (large = near-greedy)
  lambda: 0.5    # 0 = agent-chasing, 1 = bottleneck-seeking, 0.5 = balanced

# Safety: hard constraint per paper (agents MUST NOT enter B_r(H_t))
hard_safety: true

seed: 1
