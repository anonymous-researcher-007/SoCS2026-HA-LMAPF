# Experiment: Task Arrival Rate - Medium (every 10 steps)
# Evaluates system performance under moderate task arrival pressure. New tasks
# arrive every 10 simulation steps, providing a balanced workload that keeps
# agents busy without creating excessive queueing.

map_path: "data/maps/warehouse-10-20-10-2-1.map"
seed: 0
steps: 2000
num_agents: 20
num_humans: 5
fov_radius: 4
safety_radius: 1
global_solver: "lacam"
replan_every: 25
horizon: 50
communication_mode: "token"
local_planner: "astar"
human_model: "random_walk"
human_model_params: {}
hard_safety: true
mode: "lifelong"
task_allocator: "greedy"
task_arrival_rate: 10
