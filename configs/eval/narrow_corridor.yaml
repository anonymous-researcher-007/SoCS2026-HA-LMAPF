# Experiment: Narrow Corridor (Maze Map)
# Evaluates performance on a maze map with narrow corridors where agents
# frequently compete for limited passage space. Tests the system's ability
# to handle bottlenecks and coordination in constrained topologies.

map_path: "data/maps/maze-32-32-2.map"
seed: 0
steps: 1500
num_agents: 15
num_humans: 5
fov_radius: 4
safety_radius: 1
global_solver: "lacam"
replan_every: 25
horizon: 50
communication_mode: "token"
local_planner: "astar"
human_model: "random_walk"
human_model_params: {}
hard_safety: true
mode: "lifelong"
task_allocator: "greedy"
