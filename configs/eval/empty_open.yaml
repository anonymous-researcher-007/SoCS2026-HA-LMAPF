# Experiment: Empty Open Map
# Evaluation on a 32x32 open grid with no internal obstacles. Tests the
# planner in unconstrained environments where agents can move freely.

map_path: "data/maps/empty-32-32.map"
seed: 0
steps: 2000
num_agents: 30
num_humans: 5
fov_radius: 4
safety_radius: 1
global_solver: "lacam"
replan_every: 25
horizon: 50
communication_mode: "token"
local_planner: "astar"
human_model: "random_walk"
human_model_params: {}
hard_safety: true
mode: "lifelong"
task_allocator: "greedy"