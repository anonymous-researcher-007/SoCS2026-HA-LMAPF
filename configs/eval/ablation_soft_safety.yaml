# Experiment: Ablation - Soft Safety Constraint
# Disables the hard safety constraint to quantify its impact on both
# throughput and the number of human-robot proximity violations. All
# other parameters match the warehouse_structured baseline.

map_path: "data/maps/warehouse-10-20-10-2-1.map"
seed: 0
steps: 2000
num_agents: 20
num_humans: 5
fov_radius: 4
safety_radius: 1
global_solver: "lacam"
replan_every: 25
horizon: 50
communication_mode: "token"
local_planner: "astar"
human_model: "random_walk"
human_model_params: {}
hard_safety: false
mode: "lifelong"
task_allocator: "greedy"
