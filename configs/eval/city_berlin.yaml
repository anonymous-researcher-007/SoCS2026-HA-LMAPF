# Experiment: Large City Map (Berlin)
# Large-scale evaluation on the Berlin 256x256 city map. Uses a longer
# planning horizon and less frequent replanning to keep computation
# tractable while accommodating the larger environment.

map_path: "data/maps/Berlin_1_256.map"
seed: 0
steps: 1000
num_agents: 50
num_humans: 10
fov_radius: 4
safety_radius: 1
global_solver: "lacam"
replan_every: 50
horizon: 80
communication_mode: "token"
local_planner: "astar"
human_model: "random_walk"
human_model_params: {}
hard_safety: true
mode: "lifelong"
task_allocator: "greedy"
