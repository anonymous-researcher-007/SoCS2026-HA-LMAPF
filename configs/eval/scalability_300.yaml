# Experiment: Scalability Sweep - 300 Agents
# Part of the agent-count scalability study. Tests system throughput and
# planning time with 300 agents on a large warehouse map to evaluate
# performance at high agent density.

map_path: "data/maps/warehouse-20-40-10-2-1.map"
seed: 0
steps: 1000
num_agents: 300
num_humans: 5
fov_radius: 4
safety_radius: 1
global_solver: "lacam"
replan_every: 25
horizon: 50
communication_mode: "token"
local_planner: "astar"
human_model: "random_walk"
human_model_params: {}
hard_safety: true
mode: "lifelong"
task_allocator: "greedy"
