# Experiment: Solver Comparison - CBS
# Evaluates Conflict-Based Search as the global solver. Uses a reduced
# agent count (15) to keep CBS tractable within the replanning budget.
# Results are compared against the LaCAM variant.

map_path: "data/maps/warehouse-10-20-10-2-1.map"
seed: 0
steps: 2000
num_agents: 15
num_humans: 5
fov_radius: 4
safety_radius: 1
global_solver: "cbs"
replan_every: 25
horizon: 50
communication_mode: "token"
local_planner: "astar"
human_model: "random_walk"
human_model_params: {}
hard_safety: true
mode: "lifelong"
task_allocator: "greedy"
