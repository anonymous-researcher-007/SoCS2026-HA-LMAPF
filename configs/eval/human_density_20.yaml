# Experiment: Human Density Sweep - 20 Humans
# Part of the human density study. High human density scenario where
# the number of humans matches the number of agents, representing a
# heavily shared workspace.

map_path: "data/maps/warehouse-10-20-10-2-1.map"
seed: 0
steps: 2000
num_agents: 20
num_humans: 20
fov_radius: 4
safety_radius: 1
global_solver: "lacam"
replan_every: 25
horizon: 50
communication_mode: "token"
local_planner: "astar"
human_model: "random_walk"
human_model_params: {}
hard_safety: true
mode: "lifelong"
task_allocator: "greedy"
