# Experiment: Task Arrival Rate - Slow (every 25 steps)
# Evaluates system performance under low task arrival pressure. New tasks
# arrive every 25 simulation steps, resulting in periods of agent idleness
# and testing how efficiently the system resumes work after idle gaps.

map_path: "data/maps/warehouse-10-20-10-2-1.map"
seed: 0
steps: 2000
num_agents: 20
num_humans: 5
fov_radius: 4
safety_radius: 1
global_solver: "lacam"
replan_every: 25
horizon: 50
communication_mode: "token"
local_planner: "astar"
human_model: "random_walk"
human_model_params: {}
hard_safety: true
mode: "lifelong"
task_allocator: "greedy"
task_arrival_rate: 25
