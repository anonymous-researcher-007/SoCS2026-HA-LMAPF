# Experiment: Execution Delay - 10% Probability
# Tests robustness to stochastic execution delays. Each agent action has a
# 10% chance of being delayed by 2 timesteps, representing moderate actuation
# uncertainty in warehouse environments.

map_path: "data/maps/warehouse-10-20-10-2-1.map"
seed: 0
steps: 2000
num_agents: 20
num_humans: 5
fov_radius: 4
safety_radius: 1
global_solver: "lacam"
replan_every: 25
horizon: 50
communication_mode: "token"
local_planner: "astar"
human_model: "random_walk"
human_model_params: {}
hard_safety: true
mode: "lifelong"
task_allocator: "greedy"
execution_delay_prob: 0.10
execution_delay_steps: 2
