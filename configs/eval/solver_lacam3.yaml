# Experiment: Solver Comparison - LaCAM3 (Official C++)
# Evaluates the official LaCAM3 C++ executable as the global solver.
# LaCAM3 is the latest version of LaCAM and provides
# very fast planning for large-scale MAPF problems.
#
# IMPORTANT: Requires LaCAM3 binary to be built and installed:
#   1. git clone --recursive https://github.com/Kei18/lacam3.git
#   2. cd lacam3 && cmake -B build && make -C build
#   3. cp build/main src/ha_lmapf/global_tier/solvers/lacam3

map_path: "data/maps/warehouse-10-20-10-2-1.map"
seed: 0
steps: 2000
num_agents: 50
num_humans: 10
fov_radius: 4
safety_radius: 1
global_solver: "lacam3"
replan_every: 25
horizon: 60
communication_mode: "token"
local_planner: "astar"
human_model: "random_walk"
human_model_params: {}
hard_safety: true
mode: "lifelong"
task_allocator: "greedy"