# Experiment: Solver Comparison - LaCAM Official (C++)
# Evaluates the official LaCAM C++ executable (original version) as global solver.
# This is the original LaCAM C++ implementation.
#
# IMPORTANT: Requires LaCAM binary to be built and installed:
#   1. git clone --recursive https://github.com/Kei18/lacam.git
#   2. cd lacam && cmake -B build && make -C build
#   3. cp build/main src/ha_lmapf/global_tier/solvers/lacam_official

map_path: "data/maps/warehouse-10-20-10-2-1.map"
seed: 0
steps: 2000
num_agents: 50
num_humans: 10
fov_radius: 4
safety_radius: 1
global_solver: "lacam_official"
replan_every: 25
horizon: 60
communication_mode: "token"
local_planner: "astar"
human_model: "random_walk"
human_model_params: {}
hard_safety: true
mode: "lifelong"
task_allocator: "greedy"