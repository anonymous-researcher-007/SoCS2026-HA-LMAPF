# Map and tasks
map_path: data/maps/warehouse_small.map
task_stream_path: data/task_streams/warehouse_small_seed1.json  # set to null to auto-generate tasks

# Simulation length
steps: 2000

# Agents and humans (ABLATION)
num_agents: 20
num_humans: 0

# Perception and safety (ABLATION)
fov_radius: 4
safety_radius: 0

# Global planning (Tier 1)
global_solver: "cbs"
replan_every: 25
horizon: 50

# Local execution (Tier 2)
comms_mode: "token"
local_planner: "astar"

# Human behavior model (unused when num_humans=0)
human_model: "random_walk"

seed: 1
